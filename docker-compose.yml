services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: koro
      POSTGRES_PASSWORD: koro
      POSTGRES_DB: koro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
      - ./migrations/002_portal_demo.sql:/docker-entrypoint-initdb.d/002_portal_demo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koro -d koro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: api
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://koro:koro@postgres:5432/koro?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://koro:koro@postgres:5432/koro?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
